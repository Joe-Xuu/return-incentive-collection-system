<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=2500, initial-scale=1.0">
<title>Rich Menu Preview (2500×843)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 2500px; height: 843px;
    font-family: 'Montserrat', 'Noto Sans JP', sans-serif;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 50%, #f0fdf4 100%);
  }
  .card {
    display: flex; align-items: center; gap: 60px;
    padding: 60px 120px;
    background: #ffffff;
    border-radius: 64px;
    border: 6px solid #06C755;
    box-shadow: 0 20px 80px rgba(6,199,85,0.12);
  }
  .icon { font-size: 180px; line-height: 1; }
  .text-group { display: flex; flex-direction: column; gap: 12px; }
  .title {
    font-size: 96px; font-weight: 900; color: #06C755;
    letter-spacing: 0.03em;
  }
  .sub {
    font-size: 44px; color: #666666; font-weight: 700;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
<div class="card">
  <span class="icon">🔄</span>
  <div class="text-group">
    <span class="title">Re:Turn</span>
    <span class="sub">Tap to open Dashboard</span>
  </div>
</div>
</body>
</html>
